      { q: "Педагогическая деятельность требует:", opts: ["Любви к детям","Агрессии","Безразличия","Конфликтности"], ans: 0 },
      { q: "Что помогает запоминанию материала?", opts: ["Наглядность","Страх","Наказание","Игнорирование"], ans: 0 },
      { q: "Что относится к видам уроков?", opts: ["Комбинированный урок","Наказание","Контроль поведения","Конфликтный урок"], ans: 0 },
      { q: "Что такое педагогическая диагностика?", opts: ["Изучение уровня развития учащихся","Наказание","Контроль дисциплины","Игра"], ans: 0 },
      { q: "Что важно для успешной работы учителя?", opts: ["Саморазвитие","Равнодушие","Агрессия","Безответственность"], ans: 0 },
      { q: "Современный педагог должен:", opts: ["Владеть инновационными технологиями","Использовать только старые методы","Быть строгим","Игнорировать развитие науки"], ans: 0 }
    ]
  }
];

const letters = ["A","B","C","D"];

let state = {
  setIdx: 0,
  cur: 0,
  answers: [{}, {}],
  done: false
};

function getSet() { return sets[state.setIdx]; }
function getQ() { return getSet().questions[state.cur]; }
function getAns() { return state.answers[state.setIdx][state.cur]; }
function totalQ() { return getSet().questions.length; }
function answered() { return Object.keys(state.answers[state.setIdx]).length; }
function correct() {
  const a = state.answers[state.setIdx];
  return Object.entries(a).filter(([i,v]) => v === sets[state.setIdx].questions[i].ans).length;
}

function render() {
  const app = document.getElementById('app');
  const set = getSet();
  const total = totalQ();
  const ans = answered();

  if (state.done) {
    const c = correct();
    const pct = Math.round(c / total * 100);
    app.innerHTML = `
      <div class="quiz-header">
        <h1>${set.title}</h1>
        <p>Результаты теста</p>
      </div>
      <div class="score-card">
        <div class="score-big">${pct}%</div>
        <div class="score-label">итоговый результат</div>
        <div class="score-detail">
          <div class="score-cell"><div class="score-cell-val" style="color:#1D9E75">${c}</div><div class="score-cell-lbl">правильных</div></div>
          <div class="score-cell"><div class="score-cell-val" style="color:#E24B4A">${total - c}</div><div class="score-cell-lbl">ошибок</div></div>
          <div class="score-cell"><div class="score-cell-val">${total}</div><div class="score-cell-lbl">всего</div></div>
        </div>
        <div style="margin-top:1.5rem;display:flex;gap:8px;justify-content:center;">
          <button class="nav-btn" onclick="restart()">Повторить</button>
          <button class="nav-btn" onclick="switchSet(${state.setIdx === 0 ? 1 : 0})">${state.setIdx === 0 ? 'Перейти к набору 2' : 'Перейти к набору 1'}</button>
        </div>
      </div>`;
    return;
  }

  const q = getQ();
  const chosen = getAns();
  const revealed = chosen !== undefined;

  let optsHtml = q.opts.map((o, i) => {
    let cls = 'option';
    if (revealed) {
      if (i === q.ans) cls += ' correct';
      else if (i === chosen && chosen !== q.ans) cls += ' wrong';
    } else if (i === chosen) cls += ' selected';
    const clickable = revealed ? '' : `onclick="pick(${i})"`;
    return `<button class="${cls}" ${clickable} ${revealed ? 'disabled' : ''}>
      <span class="option-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`;
  }).join('');

  let feedbackHtml = '';
  if (revealed) {
    if (chosen === q.ans) {
      feedbackHtml = `<div class="feedback ok">✓ Верно!</div>`;
    } else {
      feedbackHtml = `<div class="feedback no">✗ Неверно. Правильный ответ: ${letters[q.ans]}) ${q.opts[q.ans]}</div>`;
    }
  }

  const progress = ans / total;

  app.innerHTML = `
    <div class="quiz-header">
      <h1>${set.title}</h1>
      <p>2 курс · Педагогика и методика начального обучения</p>
    </div>
    <div class="set-tabs">
      <button class="set-tab ${state.setIdx===0?'active':''}" onclick="switchSet(0)">Набор 1</button>
      <button class="set-tab ${state.setIdx===1?'active':''}" onclick="switchSet(1)">Набор 2</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress*100}%"></div></div>
    <div class="question-card">
      <div class="q-num">Вопрос ${state.cur + 1} из ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${feedbackHtml}
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${state.cur === 0 ? 'disabled' : ''}>← Назад</button>
      <span class="pager">${ans} / ${total} отвечено</span>
      ${state.cur < total - 1
        ? `<button class="nav-btn primary" onclick="next()">Вперёд →</button>`
        : `<button class="nav-btn primary" onclick="finish()" ${ans < total ? 'disabled title="Ответьте на все вопросы"' : ''}>Завершить</button>`
      }
    </div>`;
}

function pick(i) {
  state.answers[state.setIdx][state.cur] = i;
  render();
}
function next() { if (state.cur < totalQ() - 1) { state.cur++; render(); } }
function prev() { if (state.cur > 0) { state.cur--; render(); } }
function finish() { state.done = true; render(); }
function restart() { state.answers[state.setIdx] = {}; state.cur = 0; state.done = false; render(); }
function switchSet(idx) { state.setIdx = idx; state.cur = 0; state.done = false; render(); }

render();
</script>
