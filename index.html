let state = { setIdx:0, cur:0, answers:[{},{},{}], done:false };
const S = () => sets[state.setIdx];
const Q = () => S().questions[state.cur];
const A = () => state.answers[state.setIdx][state.cur];
const total = () => S().questions.length;
const answered = () => Object.keys(state.answers[state.setIdx]).length;
const correct = () => {
  const a = state.answers[state.setIdx];
  return Object.entries(a).filter(([i,v])=>v===S().questions[i].ans).length;
};

function render(){
  const app = document.getElementById('app');
  const s = S(); const t = total(); const an = answered();
  const tabs = sets.map((s2,i)=>`<button class="set-tab${state.setIdx===i?' active':''}" onclick="sw(${i})">${i===0?'Набор 1':i===1?'Набор 2':'Набор 3'}<span class="badge">${s2.questions.length}</span></button>`).join('');

  if(state.done){
    const c=correct(), pct=Math.round(c/t*100);
    app.innerHTML=`<div class="quiz-header"><h1>${s.title}</h1><p>Результаты теста</p></div>
    <div class="score-card">
      <div class="score-big">${pct}%</div>
      <div class="score-label">итоговый результат</div>
      <div class="score-detail">
        <div class="score-cell"><div class="score-cell-val" style="color:#1D9E75">${c}</div><div class="score-cell-lbl">правильных</div></div>
        <div class="score-cell"><div class="score-cell-val" style="color:#E24B4A">${t-c}</div><div class="score-cell-lbl">ошибок</div></div>
        <div class="score-cell"><div class="score-cell-val">${t}</div><div class="score-cell-lbl">всего</div></div>
      </div>
      <div style="margin-top:1.5rem;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="nav-btn" onclick="restart()">Повторить</button>
        ${sets.map((_,i)=>i!==state.setIdx?`<button class="nav-btn" onclick="sw(${i})">Набор ${i+1}</button>`:'').join('')}
      </div>
    </div>`;
    return;
  }

  const q=Q(), chosen=A(), revealed=chosen!==undefined;
  const opts=q.opts.map((o,i)=>{
    let cls='option';
    if(revealed){ if(i===q.ans) cls+=' correct'; else if(i===chosen&&chosen!==q.ans) cls+=' wrong'; }
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="pick(${i})">
      <span class="option-letter">${L[i]}</span><span>${o}</span></button>`;
  }).join('');

  const fb=revealed?(chosen===q.ans
    ?`<div class="feedback ok">✓ Верно!</div>`
    :`<div class="feedback no">✗ Неверно. Правильный ответ: ${L[q.ans]}) ${q.opts[q.ans]}</div>`):'';

  app.innerHTML=`
    <div class="quiz-header"><h1>${s.title}</h1><p>${s.sub} · 2 курс · ПМНО</p></div>
    <div class="set-tabs">${tabs}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${an/t*100}%"></div></div>
    <div class="question-card">
      <div class="q-num">Вопрос ${state.cur+1} из ${t}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>${fb}
    </div>

      <button class="nav-btn" onclick="prev()" ${state.cur===0?'disabled':''}>← Назад</button>
      <span class="pager">${an} / ${t} отвечено</span>
      ${state.cur<t-1
        ?`<button class="nav-btn primary" onclick="next()">Вперёд →</button>`
        :`<button class="nav-btn primary" onclick="finish()" ${an<t?'disabled':''}>Завершить</button>`}
    </div>`;
}

function pick(i){ state.answers[state.setIdx][state.cur]=i; render(); }
function next(){ if(state.cur<total()-1){state.cur++;render();} }
function prev(){ if(state.cur>0){state.cur--;render();} }
function finish(){ state.done=true; render(); }
function restart(){ state.answers[state.setIdx]={}; state.cur=0; state.done=false; render(); }
function sw(i){ state.setIdx=i; state.cur=0; state.done=false; render(); }
render();
</script>
